<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

  .toolbar { display: flex; gap: 12px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; align-items: center; flex-shrink: 0; }
  .toolbar select { padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: #fff; min-width: 140px; }
  .toolbar select:focus { outline: none; border-color: #4a90d9; }
  .toolbar label { font-size: 13px; color: #666; }
  .toolbar .rank-badge { font-size: 12px; color: #999; margin-left: 4px; }
  .btn-clear { padding: 6px 14px; border: 1px solid #e74c3c; color: #e74c3c; background: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; margin-left: auto; }
  .btn-clear:hover { background: #e74c3c; color: #fff; }

  .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #4a90d9; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #fff; color: #333; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
  .msg.error { align-self: center; background: #ffeaea; color: #c0392b; border: 1px solid #f5c6cb; font-size: 13px; }
  .msg .model-tag { font-size: 11px; color: #999; margin-bottom: 4px; }
  .msg.assistant .model-tag { color: #aaa; }

  .typing-indicator { align-self: flex-start; padding: 10px 14px; background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; border-bottom-left-radius: 4px; display: none; }
  .typing-indicator span { display: inline-block; width: 8px; height: 8px; background: #ccc; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out; }
  .typing-indicator span:nth-child(1) { animation-delay: 0s; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

  .input-area { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #e0e0e0; flex-shrink: 0; }
  .input-area textarea { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; resize: none; height: 44px; max-height: 120px; font-family: inherit; line-height: 1.5; }
  .input-area textarea:focus { outline: none; border-color: #4a90d9; }
  .btn-send { padding: 0 20px; background: #4a90d9; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }
  .btn-send:hover { background: #357abd; }
  .btn-send:disabled { background: #ccc; cursor: not-allowed; }
</style>
</head>
<body>

<div class="toolbar">
  <label>开发商</label>
  <select id="providerSelect"></select>
  <label>模型</label>
  <select id="modelSelect"></select>
  <span id="rankInfo" class="rank-badge"></span>
  <button class="btn-clear" onclick="clearChat()">清空对话</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg assistant">选择开发商和模型，开始对话吧。</div>
</div>

<div class="typing-indicator" id="typingIndicator">
  <span></span><span></span><span></span>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
  <button class="btn-send" id="btnSend" onclick="sendMessage()">发送</button>
</div>

<script>
const API_KEY = 'sk-7bhlww4oak63t7ha8fyt157rbo2jxwtp';
const API_URL = 'https://api.b.ai/v1/chat/completions';

const MODELS = [
  { model: "claude-opus-4.7", label: "Claude Opus 4.7", provider: "Anthropic", rank: 1, rankDelta: 0 },
  { model: "gpt-5.5", label: "GPT-5.5", provider: "OpenAI", rank: 2, rankDelta: 1 },
  { model: "claude-sonnet-4.6", label: "Claude Sonnet 4.6", provider: "Anthropic", rank: 3, rankDelta: -1 },
  { model: "claude-haiku-4.5", label: "Claude Haiku 4.5", provider: "Anthropic", rank: 4, rankDelta: 2 },
  { model: "deepseek-v4-pro", label: "DeepSeek-V4-Pro", provider: "DeepSeek", rank: 5, rankDelta: -1 },
  { model: "gemini-3.1-pro", label: "Gemini 3.1 pro", provider: "Google", rank: 6, rankDelta: 1 },
  { model: "gpt-5.2", label: "GPT-5.2", provider: "OpenAI", rank: 7, rankDelta: 9 },
  { model: "deepseek-v4-flash", label: "DeepSeek-V4-Flash", provider: "DeepSeek", rank: 8, rankDelta: 0 },
  { model: "claude-opus-4.5", label: "Claude Opus 4.5", provider: "Anthropic", rank: 9, rankDelta: -4 },
  { model: "gpt-5.4", label: "GPT-5.4", provider: "OpenAI", rank: 10, rankDelta: -1 },
  { model: "glm-5.1", label: "GLM-5.1", provider: "Zhipu AI", rank: 11, rankDelta: 7 },
  { model: "glm-5", label: "GLM-5", provider: "Zhipu AI", rank: 12, rankDelta: 2 },
  { model: "gpt-5.4-nano", label: "GPT-5.4-nano", provider: "OpenAI", rank: 13, rankDelta: -2 },
  { model: "claude-sonnet-4.5", label: "Claude Sonnet 4.5", provider: "Anthropic", rank: 14, rankDelta: 1 },
  { model: "gemini-3-flash", label: "Gemini 3 flash", provider: "Google", rank: 15, rankDelta: -5 },
  { model: "gpt-5-nano", label: "GPT-5-nano", provider: "OpenAI", rank: 16, rankDelta: -4 },
  { model: "gpt-5-mini", label: "GPT-5-mini", provider: "OpenAI", rank: 17, rankDelta: -4 },
  { model: "gpt-5.4-mini", label: "GPT-5.4-mini", provider: "OpenAI", rank: 18, rankDelta: 2 },
  { model: "deepseek-v3.2", label: "DeepSeek-V3.2", provider: "DeepSeek", rank: 19, rankDelta: -2 },
  { model: "gpt-5.5-instant", label: "GPT-5.5-Instant", provider: "OpenAI", rank: 20, rankDelta: -1 },
];

let messages = [];
let sending = false;

const providerSelect = document.getElementById('providerSelect');
const modelSelect = document.getElementById('modelSelect');
const rankInfo = document.getElementById('rankInfo');
const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const btnSend = document.getElementById('btnSend');
const typingIndicator = document.getElementById('typingIndicator');

// 按开发商分组
const providers = [...new Set(MODELS.map(m => m.provider))];
providers.forEach(p => {
  const opt = document.createElement('option');
  opt.value = p;
  opt.textContent = p;
  providerSelect.appendChild(opt);
});

providerSelect.addEventListener('change', updateModels);
modelSelect.addEventListener('change', updateRankInfo);

function updateModels() {
  const provider = providerSelect.value;
  const filtered = MODELS.filter(m => m.provider === provider);
  modelSelect.innerHTML = '';
  filtered.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.model;
    opt.textContent = `#${m.rank} ${m.label}`;
    modelSelect.appendChild(opt);
  });
  updateRankInfo();
}

function updateRankInfo() {
  const m = MODELS.find(x => x.model === modelSelect.value);
  if (!m) { rankInfo.textContent = ''; return; }
  const arrow = m.rankDelta > 0 ? `↑${m.rankDelta}` : m.rankDelta < 0 ? `↓${Math.abs(m.rankDelta)}` : '–';
  rankInfo.textContent = `排名 #${m.rank} (${arrow})`;
}

updateModels();

// 自动调整 textarea 高度
userInput.addEventListener('input', () => {
  userInput.style.height = '44px';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function appendMsg(role, content, modelLabel) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant' && modelLabel) {
    const tag = document.createElement('div');
    tag.className = 'model-tag';
    tag.textContent = modelLabel;
    div.appendChild(tag);
  }
  const text = document.createTextNode(content);
  div.appendChild(text);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function appendError(text) {
  const div = document.createElement('div');
  div.className = 'msg error';
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function clearChat() {
  messages = [];
  chatArea.innerHTML = '<div class="msg assistant">对话已清空，重新开始吧。</div>';
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || sending) return;

  const model = modelSelect.value;
  const modelInfo = MODELS.find(m => m.model === model);

  appendMsg('user', text);
  messages.push({ role: 'user', content: text });

  userInput.value = '';
  userInput.style.height = '44px';
  sending = true;
  btnSend.disabled = true;
  typingIndicator.style.display = 'block';
  chatArea.scrollTop = chatArea.scrollHeight;

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${API_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model,
        messages: [...messages],
        stream: false,
        temperature: 0.7,
        max_tokens: 2000,
      }),
    });

    const data = await resp.json();

    if (!resp.ok) {
      appendError(`API 错误 ${resp.status}: ${data.error?.message || JSON.stringify(data)}`);
      return;
    }

    const reply = data.choices?.[0]?.message?.content;
    if (reply) {
      messages.push({ role: 'assistant', content: reply });
      appendMsg('assistant', reply, modelInfo?.label || model);
    } else {
      appendError('AI 返回了空内容: ' + JSON.stringify(data));
    }
  } catch (err) {
    appendError('请求失败: ' + err.message);
  } finally {
    sending = false;
    btnSend.disabled = false;
    typingIndicator.style.display = 'none';
    chatArea.scrollTop = chatArea.scrollHeight;
    userInput.focus();
  }
}

userInput.focus();
</script>
</body>
</html>
